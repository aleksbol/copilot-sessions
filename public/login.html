<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Copilot Sessions</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1e1e1e;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .login-card {
      text-align: center;
      padding: 48px 40px;
      border-radius: 12px;
      background: #252526;
      border: 1px solid #404040;
      max-width: 380px;
      width: 90%;
    }
    .login-card h1 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #e0e0e0;
    }
    .login-card p {
      font-size: 14px;
      color: #999;
      margin-bottom: 32px;
    }
    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      background: #0078d4;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #1a8cff; }
    .login-btn svg { width: 20px; height: 20px; fill: #fff; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Copilot Sessions</h1>
    <p>Sign in with your Microsoft account to continue.</p>
    <a href="/auth/login" class="login-btn">
      <svg viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Sign in with Microsoft
    </a>
  </div>
</body>
</html>
