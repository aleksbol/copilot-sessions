<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Copilot Sessions</title>
  <link rel="stylesheet" href="/styles.css" />
  <!-- Markdown rendering -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>Sessions</h2>
      <button id="new-session-btn" class="btn-icon" title="New session">＋</button>
    </div>
    <div id="session-list" class="session-list"></div>
  </aside>

  <!-- New Session Dialog -->
  <div id="new-session-dialog" class="dialog-overlay" style="display:none">
    <div class="dialog">
      <h3>New Session</h3>
      <div class="dialog-field">
        <label for="new-cwd-input">Working Directory</label>
        <input id="new-cwd-input" type="text" placeholder="e.g. C:\repos\my-project" />
      </div>
      <div class="dialog-field">
        <label for="new-model-select">Model</label>
        <select id="new-model-select">
          <option value="">Loading models...</option>
        </select>
      </div>
      <div class="dialog-actions">
        <button id="new-session-cancel" class="dialog-btn dialog-btn-secondary">Cancel</button>
        <button id="new-session-create" class="dialog-btn dialog-btn-primary">Create</button>
      </div>
    </div>
  </div>

  <!-- Sidebar overlay for mobile -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- Main chat area -->
  <main class="chat-main">
    <header class="chat-header">
      <button id="menu-btn" class="btn-icon menu-btn" title="Sessions">☰</button>
      <h1 id="chat-title">Copilot Sessions</h1>
      <div class="header-meta">
        <span id="header-cwd" class="header-cwd" title="Working directory"></span>
        <select id="header-model-select" class="header-model-select" title="Change model" style="display:none">
        </select>
        <button id="diff-btn" class="btn-icon diff-btn" title="View local changes" style="display:none">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
            <path d="M11.93 8.5a4.002 4.002 0 0 1-7.86 0H.75a.75.75 0 0 1 0-1.5h3.32a4.002 4.002 0 0 1 7.86 0h3.32a.75.75 0 0 1 0 1.5Zm-1.43-.75a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0Z"/>
          </svg>
        </button>
        <button id="processes-btn" class="btn-icon processes-btn" title="View processes">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
            <path d="M0 2.75C0 1.784.784 1 1.75 1h12.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0 1 14.25 15H1.75A1.75 1.75 0 0 1 0 13.25Zm1.75-.25a.25.25 0 0 0-.25.25v10.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V2.75a.25.25 0 0 0-.25-.25ZM3.5 5.25a.75.75 0 0 1 .75-.75h1a.75.75 0 0 1 0 1.5h-1a.75.75 0 0 1-.75-.75Zm.75 2.25a.75.75 0 0 0 0 1.5h3a.75.75 0 0 0 0-1.5Zm0 3a.75.75 0 0 0 0 1.5h1a.75.75 0 0 0 0-1.5Z"/>
          </svg>
          <span id="processes-badge" class="processes-badge" style="display:none">0</span>
        </button>
      </div>
    </header>

    <div id="messages" class="messages">
      <div class="empty-state">
        <div class="empty-icon">✦</div>
        <p>Start a new session to begin</p>
      </div>
    </div>

    <footer class="chat-input-bar">
      <div class="input-wrapper">
        <textarea
          id="message-input"
          placeholder="Send a message..."
          rows="1"
          autocomplete="off"
        ></textarea>
        <button id="stop-btn" class="stop-btn" style="display:none" title="Stop generating">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <rect x="3" y="3" width="10" height="10" rx="2"/>
          </svg>
        </button>
        <button id="send-btn" class="send-btn" disabled title="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13"></path>
            <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
          </svg>
        </button>
      </div>
      <div id="context-bar" class="context-bar" style="display:none">
        <div class="context-bar-track">
          <div id="context-bar-fill" class="context-bar-fill"></div>
        </div>
        <span id="context-bar-label" class="context-bar-label"></span>
      </div>
    </footer>
  </main>

  <!-- Diff panel -->
  <div id="diff-panel" class="diff-panel" style="display:none">
    <div class="diff-panel-header">
      <h2>Local Changes</h2>
      <div class="diff-panel-actions">
        <button id="diff-refresh-btn" class="btn-icon" title="Refresh">↻</button>
        <button id="diff-close-btn" class="btn-icon" title="Close">✕</button>
      </div>
    </div>
    <div id="diff-stat" class="diff-stat"></div>
    <div id="diff-content" class="diff-content"></div>
  </div>
  <div id="diff-overlay" class="diff-overlay" style="display:none"></div>

  <!-- Processes panel -->
  <div id="processes-panel" class="processes-panel" style="display:none">
    <div class="processes-panel-header">
      <h2>Processes</h2>
      <div class="processes-panel-actions">
        <button id="processes-close-btn" class="btn-icon" title="Close">✕</button>
      </div>
    </div>
    <div id="processes-list" class="processes-list">
      <div class="processes-empty">No processes yet</div>
    </div>
  </div>
  <div id="processes-overlay" class="processes-overlay" style="display:none"></div>

  <script src="/app.js"></script>
</body>
</html>
